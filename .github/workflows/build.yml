name: build

# 交叉编译 vernesong/mihomo 的 Alpha (smart) 分支，去掉 with_gvisor，
# 发布两个产物（同一个裸 aarch64 二进制的不同封装）：
#   mihomo-linux-arm64.gz  —— 推荐。ShellCrash #1305 起，tmpfs+压缩rom 设备会
#                             把它解出的裸二进制存于 rom(透明压缩)并软链，运行时
#                             file-backed 可回收(RssShmem 0)；下载量约 15M。
#   mihomo-linux-arm64.upx —— 兼容旧版 ShellCrash(无 #1305)。名为 .upx 但实为裸
#                             二进制，走「只软链」分支从 rom 执行，同样省内存；
#                             下载量为完整 31M。升级 ShellCrash 后改用 .gz。
# 详见 juewuy/ShellCrash#1304 / #1305。

on:
  schedule:
    - cron: '0 4 * * *'        # 每日追一次上游
  workflow_dispatch:            # 手动触发
  push:
    paths:
      - '.github/workflows/build.yml'

permissions:
  contents: write               # 建 release 需要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vernesong/mihomo Alpha
        uses: actions/checkout@v4
        with:
          repository: vernesong/mihomo
          ref: Alpha
          fetch-depth: 0        # git rev-parse 需要完整历史

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'    # 对齐上游 CI 的 linux/arm64 默认，go.mod 的 1.20 编不过

      - name: Resolve version
        id: ver
        run: echo "version=alpha-smart-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build (no gvisor)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
          GOARM64: v8.0
        run: |
          go build -trimpath \
            -ldflags '-X "github.com/metacubex/mihomo/constant.Version=${{ steps.ver.outputs.version }}" -w -s -buildid=' \
            -o mihomo-linux-arm64 .
          # 交叉编译产物无法在 amd64 runner 上执行，只做格式与体积校验
          file mihomo-linux-arm64 | tee /dev/stderr | grep -q 'ARM aarch64'
          # .gz：gzip 压缩(下载~15M)；.upx：同一裸二进制原样改名(兼容旧版)
          gzip -c -9 mihomo-linux-arm64 > mihomo-linux-arm64.gz
          cp mihomo-linux-arm64 mihomo-linux-arm64.upx
          ls -l mihomo-linux-arm64 mihomo-linux-arm64.gz mihomo-linux-arm64.upx

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ${{ steps.ver.outputs.version }} (no gvisor)
          body: |
            vernesong/mihomo Alpha (smart)，去掉 `with_gvisor`，裸 aarch64 二进制。
            上游 commit: ${{ steps.ver.outputs.version }}

            ShellCrash `custcorelink`：
            - 新版(含 #1305 store-raw)：指向 `mihomo-linux-arm64.gz`（下载约 15M）。
            - 旧版：指向 `mihomo-linux-arm64.upx`（裸二进制，下载 31M）。
          files: |
            mihomo-linux-arm64.gz
            mihomo-linux-arm64.upx
          make_latest: 'true'
